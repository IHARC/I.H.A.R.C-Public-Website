            - heading "Northumberland neighbours working for housing stability and overdose prevention." [level=1] [ref=e35]
            - paragraph [ref=e36]: IHARC is the Integrated Homelessness and Addictions Response Centre, a non-profit working across Northumberland County. This main site keeps neighbours, service agencies, and local government aligned on the story, while STEVI (Supportive Technology to Enable Vulnerable Individuals) hosts secure outreach plans and crisis coordination.
            - paragraph [ref=e37]: Together we co-design rapid responses that centre housing stability, overdose prevention, and accountable public reporting.
